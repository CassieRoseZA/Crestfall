enabled: true

# Crestfall lore announcement settings.
# Put the actual lore lines in announcements.txt.

placeholderapi:
  # If PlaceholderAPI is installed, lore lines can use placeholders like %player_name%.
  enabled: true

recipe-sync:
  # Server-side recipe discovery sync. This pushes all Bukkit/Paper-visible recipe keys
  # to players through the vanilla recipe discovery API.
  #
  # REI/JEI are client-side mods. A Paper plugin cannot directly populate their custom
  # recipe panels without a matching client-side mod, but this keeps the server recipe
  # book state as complete as Bukkit/Paper allows.
  enabled: true

  # Sync when a player joins. Useful after 1.21.2 recipe sync changes.
  sync-on-join: true
  join-delay-ticks: 60

  # Also sync online players after plugin enable or /crestfall reload.
  sync-online-players-on-enable: true
  startup-delay-ticks: 100

# Java timezone ID. Examples: Africa/Johannesburg, UTC, America/New_York.
timezone: "Africa/Johannesburg"

schedule:
  # How often Crestfall rolls the dice for a random lore announcement.
  check-interval-seconds: 900

  # Chance per check while all other requirements pass.
  chance-percent: 18.0

  # No announcements if fewer players than this are online.
  min-online-players: 1

  # Minimum gap after an announcement.
  cooldown-minutes: 45

  # Set to 0 for unlimited.
  max-announcements-per-real-day: 8

  # Usually false so admins can test without burning the daily limit.
  forced-announcements-count-toward-limit: false

odd-hours:
  enabled: true

  # Uses 24-hour HH:mm time in the configured timezone.
  # Good for unsettling server lore at weird times.
  # Windows can cross midnight, like 22:30-04:00.
  windows:
    - "00:00-04:30"
    - "13:13-13:20"
    - "22:00-23:59"

format:
  # Supports &, &#RRGGBB, CMI-style {#RRGGBB}, CMI-style <#RRGGBB>,
  # CMI-style gradients like {#ff0066>}text{#6600ff<},
  # and PlaceholderAPI placeholders when PlaceholderAPI is installed.
  prefix: "&8[{#8f5cff>}Crestfall{#ff7b9c<}&8] &7"
  suffix: ""

delivery:
  chat:
    enabled: true

  console:
    enabled: true

  actionbar:
    enabled: false

  title:
    enabled: false
    title: "{#8f5cff>}Crestfall stirs...{#ff7b9c<}"
    subtitle: "&7The hour is &f{time}"
    fade-in-ticks: 10
    stay-ticks: 70
    fade-out-ticks: 20

  sound:
    enabled: true
    # Modern sound key. Old enum-style names like ENTITY_ENDERMAN_AMBIENT also work.
    name: "entity.enderman.ambient"
    volume: 0.7
    pitch: 0.85
